# Render Blueprint: Render hosts the Express API backend only.
# Vercel hosts the Next.js frontend.
# Connect this Git repo → Render Dashboard → New Blueprint → auto-deploys on every push.
services:
  - type: web
    name: growwlytics-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build --workspace=packages/types && npm run build --workspace=apps/api
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Set the rest manually in the Render dashboard (Environment tab):
      #
      # CORS_ORIGINS          = https://your-app.vercel.app   (comma-separated if multiple)
      # APP_URL               = https://your-app.vercel.app   (used as fallback if CORS_ORIGINS not set)
      # SUPABASE_URL          = https://xxx.supabase.co
      # SUPABASE_SERVICE_ROLE_KEY = ...
      # ANTHROPIC_API_KEY     = ...
      # RAZORPAY_KEY_ID       = rzp_live_...
      # RAZORPAY_KEY_SECRET   = ...
      # IG_APP_ID             = ...
      # IG_APP_SECRET         = ...
      # IG_REDIRECT_URI       = https://growwlytics-api.onrender.com/api/auth/instagram/callback
      # ENCRYPTION_KEY        = (64-char hex)
      # JWT_SECRET            = (random secret)
