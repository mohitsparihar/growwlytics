# Render Blueprint: connect this Git repo → new Blueprint → auto-deploy on every push to the tracked branch.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: growwlytics
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
