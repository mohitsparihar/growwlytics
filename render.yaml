# Render Blueprint: connect this Git repo → new Blueprint → auto-deploy on every push to the tracked branch.
# https://render.com/docs/blueprint-spec
# Docker: see Dockerfile. Set secrets (Supabase, etc.) in the Render dashboard.
services:
  - type: web
    name: growwlytics
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
